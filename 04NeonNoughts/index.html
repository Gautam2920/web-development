<!DOCTYPE html>
<html>

<head>
    <title>Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="homeScreen" class="screen active">
        <h1>Tic Tac Toe</h1>
        <button id="startBtn">Start Game</button>
    </div>
    <div id="gameScreen" class="screen">
        <h1>Tic Tac Toe</h1>
        <div id="turn">Turn: X</div>
        <div id="scoreboard"> <span>X: <span id="scoreX">0</span></span> <span>O: <span id="scoreO">0</span></span>
        </div>
        <div id="difficulty">
            <button class="diff active" data-level="easy">Easy</button>
            <button class="diff" data-level="medium">Medium</button>
            <button class="diff" data-level="hard">Hard</button>
        </div>
        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="controls">
            <button id="resetBtn">Reset</button>
            <button id="homeBtn">Home</button>
            <button id="undoBtn">Undo</button>
            <button id="soundToggle">Sound: On</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
